name: Push to Gitlab
on:
  push:  
      branches: 
        - main 
      tags:
        - "**"
      workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{secrets.GL_TOK}}
          GITLAB_REPO: gitlab.com/LaRana99/pabio
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${GITLAB_REPO}"
          git push gitlab main
          git push gitlab --tags
      
