{% extends "base.html" %}
{% block title %}Registro de Visitantes{% endblock %}

{% block content %}
<header>
  <h1>Registro de Visitantes</h1>
  <p>Pabellón Nacional de la Biodiversidad UNAM</p>
</header>

{% if error %}
<p role="alert" class="error-message">{{ error }}</p>
{% endif %}

<form method="post" action="/visitantes">
  <label for="cantidad">Número de visitantes</label>
  <input type="number" id="cantidad" name="cantidad" min="1" required>
  <button type="submit">Registrar</button>
</form>
{% endblock %}
